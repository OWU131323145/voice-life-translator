<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VLT | データ</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.2/lib/p5.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <h1>Voice Life Translator</h1>
        <div class="hint">データ：これまでの記録を可視化します</div>
      </div>
      <div class="nav">
        <a class="nav-link" href="index.html">記録</a>
        <a class="nav-link" href="calendar.html">カレンダー</a>
        <a class="nav-link" href="chat.html">対話</a>
        <a class="nav-link" href="sleep.html">睡眠</a>
        <a class="nav-link active" href="data.html">データ</a>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">期間</div>
          <div class="hint" id="rangeHint"></div>
        </div>
        <div class="row">
          <button class="btn-ghost" id="btn7" type="button">7日</button>
          <button class="btn-ghost" id="btn30" type="button">30日</button>
          <button class="btn-ghost" id="btn90" type="button">90日</button>
          <button class="btn-ghost" id="btnAll" type="button">すべて</button>
          <button class="btn-ghost" id="btnSync" type="button">更新</button>
        </div>
      </div>

      <div class="row" style="flex-wrap:wrap;">
        <div class="card" style="min-width:200px; flex:1;">
          <div class="hint">日数</div>
          <div id="kpiDays" style="font-size:22px; font-weight:700;">-</div>
        </div>
        <div class="card" style="min-width:200px; flex:1;">
          <div class="hint">記録件数</div>
          <div id="kpiEntries" style="font-size:22px; font-weight:700;">-</div>
        </div>
        <div class="card" style="min-width:200px; flex:1;">
          <div class="hint">支出合計</div>
          <div id="kpiSpend" style="font-size:22px; font-weight:700;">-</div>
        </div>
        <div class="card" style="min-width:200px; flex:1;">
          <div class="hint">睡眠平均</div>
          <div id="kpiSleep" style="font-size:22px; font-weight:700;">-</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">グラフ</div>
          <div class="hint">支出（棒）＋睡眠（線）を同じ画面で見られます。</div>
        </div>
      </div>
      <div id="p5canvasHolder" class="card" style="padding:10px;"></div>
      <div class="hint" id="noDataHint" style="margin-top:8px;"></div>
    </div>
  </div>

  <script src="sync.js"></script>
  <script src="data.js"></script>
</body>
</html>
